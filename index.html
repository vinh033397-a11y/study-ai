<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Study Helper</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom right, #c7d2fe, #bfdbfe);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: white;
      width: 500px;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      color: #4338ca;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      color: gray;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #3730a3;
    }

    .result {
      margin-top: 25px;
      background: #f3f4f6;
      padding: 15px;
      border-radius: 10px;
      white-space: pre-line;
      line-height: 1.6;
    }

    .result h2 {
      color: #4338ca;
      margin-top: 0;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🤖 AI Study Helper</h1>
    <p>Hệ thống AI tư vấn thói quen học tập</p>

    <label>📚 Số giờ học mỗi ngày</label>
    <input type="number" id="study" placeholder="Ví dụ: 3">

    <label>📱 Số giờ dùng điện thoại</label>
    <input type="number" id="phone" placeholder="Ví dụ: 5">

    <label>🌙 Số giờ ngủ</label>
    <input type="number" id="sleep" placeholder="Ví dụ: 7">

    <button onclick="analyzeHabit()">🔍 Phân tích</button>

    <div class="result">
      <h2>📊 Kết quả phân tích</h2>
      <div id="result">
Nhập thông tin để AI phân tích thói quen học tập của bạn.
      </div>
    </div>
  </div>

  <script>

    function analyzeHabit() {

      let study = Number(document.getElementById("study").value);
      let phone = Number(document.getElementById("phone").value);
      let sleep = Number(document.getElementById("sleep").value);

      let result = "📊 PHÂN TÍCH THÓI QUEN HỌC TẬP\n\n";

      // Phân tích giờ học
      if (study < 2) {
        result += "📚 Bạn học khá ít trong ngày. Điều này có thể làm giảm hiệu quả học tập và khó ghi nhớ kiến thức.\n";
        result += "👉 Lời khuyên: Hãy tăng thời gian học lên khoảng 3–4 giờ mỗi ngày và chia nhỏ thời gian học theo phương pháp Pomodoro.\n\n";
      }

      else if (study >= 2 && study < 4) {
        result += "📖 Thời gian học của bạn ở mức trung bình.\n";
        result += "👉 Lời khuyên: Cố gắng duy trì lịch học đều đặn để cải thiện kết quả học tập.\n\n";
      }

      else {
        result += "✅ Bạn có thời gian học khá tốt.\n";
        result += "👉 Hãy tiếp tục duy trì thói quen học tập này.\n\n";
      }

      // Phân tích điện thoại
      if (phone > 4) {
        result += "📱 Bạn sử dụng điện thoại khá nhiều. Điều này dễ gây mất tập trung khi học.\n";
        result += "👉 Lời khuyên: Giảm thời gian dùng điện thoại, tắt thông báo khi học và hạn chế mạng xã hội.\n\n";
      }

      else if (phone >= 2 && phone <= 4) {
        result += "📱 Thời gian sử dụng điện thoại của bạn tương đối ổn.\n";
        result += "👉 Hãy cân bằng giữa giải trí và học tập.\n\n";
      }

      else {
        result += "👍 Bạn kiểm soát điện thoại khá tốt.\n";
        result += "👉 Đây là thói quen tích cực giúp tăng khả năng tập trung.\n\n";
      }

      // Phân tích giấc ngủ
      if (sleep < 6) {
        result += "😴 Bạn ngủ chưa đủ giấc.\n";
        result += "👉 Lời khuyên: Nên ngủ từ 7–8 tiếng mỗi ngày để đảm bảo sức khỏe và khả năng ghi nhớ.\n\n";
      }

      else {
        result += "🌙 Thời gian ngủ của bạn hợp lý.\n";
        result += "👉 Giấc ngủ tốt sẽ giúp học tập hiệu quả hơn.\n\n";
      }

      // Đánh giá tổng quát
      result += "🔎 ĐÁNH GIÁ TỔNG QUÁT:\n";

      if (study >= 4 && phone <= 2 && sleep >= 7) {
        result += "🎉 Bạn có thói quen học tập rất tốt và cân bằng.";
      }

      else if (study >= 2 && phone <= 4) {
        result += "🙂 Thói quen học tập của bạn tương đối ổn nhưng vẫn có thể cải thiện thêm.";
      }

      else {
        result += "⚠️ Bạn cần cải thiện việc quản lý thời gian học và sử dụng điện thoại.";
      }

      document.getElementById("result").innerText = result;
    }

  </script>

</body>
</html>
