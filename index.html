<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Study Helper</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom right, #c7d2fe, #bfdbfe);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: white;
      width: 420px;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      color: #4338ca;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      color: gray;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #3730a3;
    }

    .result {
      margin-top: 25px;
      background: #f3f4f6;
      padding: 15px;
      border-radius: 10px;
      white-space: pre-line;
    }

    .result h2 {
      color: #4338ca;
      margin-top: 0;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🤖 AI Study Helper</h1>
    <p>Hệ thống AI tư vấn thói quen học tập</p>

    <label>📚 Số giờ học mỗi ngày</label>
    <input type="number" id="study" placeholder="Ví dụ: 3">

    <label>📱 Số giờ dùng điện thoại</label>
    <input type="number" id="phone" placeholder="Ví dụ: 5">

    <label>🌙 Số giờ ngủ</label>
    <input type="number" id="sleep" placeholder="Ví dụ: 7">

    <button onclick="analyzeHabit()">🔍 Phân tích</button>

    <div class="result">
      <h2>📊 Kết quả</h2>
      <div id="result">Nhập thông tin để xem kết quả.</div>
    </div>
  </div>

  <script>
    function analyzeHabit() {

      let study = Number(document.getElementById("study").value);
      let phone = Number(document.getElementById("phone").value);
      let sleep = Number(document.getElementById("sleep").value);

      let result = "";

      if (study < 2) {
        result += "📚 Bạn cần tăng thời gian học.\n";
      }
      else if (study >= 4) {
        result += "✅ Thời gian học của bạn khá tốt.\n";
      }

      if (phone > 4) {
        result += "📱 Bạn nên giảm thời gian sử dụng điện thoại.\n";
      }
      else if (phone <= 2) {
        result += "👍 Bạn kiểm soát điện thoại khá tốt.\n";
      }

      if (sleep < 6) {
        result += "😴 Bạn nên ngủ đủ giấc.\n";
      }
      else {
        result += "🌙 Thời gian ngủ của bạn hợp lý.\n";
      }

      if (study >= 4 && phone <= 2 && sleep >= 7) {
        result += "\n🎉 Thói quen học tập của bạn rất tốt!";
      }
      else if (study >= 2 && phone <= 4) {
        result += "\n🙂 Thói quen học tập của bạn tương đối ổn.";
      }
      else {
        result += "\n⚠️ Bạn cần cải thiện thói quen học tập.";
      }

      document.getElementById("result").innerText = result;
    }
  </script>

</body>
</html>
